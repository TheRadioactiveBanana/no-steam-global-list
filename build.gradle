plugins {
    id 'java'
}

group = 'eradication'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    compileOnly(fileTree("libs"))
}

jar {
    manifest {
        attributes("Main-Class": "nolist.mod.Main")
    }

    from configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }

    archiveFileName = "no-steam-global-list.jar"
}